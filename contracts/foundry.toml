[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
taiko_hekla = "${TAIKO_HEKLA_RPC_URL}"
taiko = "${TAIKO_RPC_URL}"
